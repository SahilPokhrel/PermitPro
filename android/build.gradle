buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Google Services plugin
        classpath 'com.android.tools.build:gradle:8.1.0' // or latest version compatible with SDK 34
        classpath 'com.google.gms:google-services:4.4.2' // This is fine
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app") // Moved into the same subprojects closure
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
