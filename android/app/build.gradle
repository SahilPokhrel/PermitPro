buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Google Services plugin
        classpath 'com.google.gms:google-services:4.4.2' // This is fine
    }
}

plugins {
    id "com.android.application" // This is fine
    id "kotlin-android" // This is fine
    id "dev.flutter.flutter-gradle-plugin" // This is fine
    id "com.google.gms.google-services" // Moved from buildscript to plugins
}

android {
    compileSdk = 34

    defaultConfig {
        applicationId = "com.example.permitpro"
        minSdk = 21
        targetSdk = 34
        versionCode = 1
        versionName = "1.0"
    }
    namespace = "com.example.permitpro"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    buildTypes {
        release {
            minifyEnabled true  // Enabled for code shrinking
            shrinkResources true  // Enable resource shrinking
            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
            signingConfig signingConfigs.debug // This is fine
        }
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.4.0') // Ensure this is at the top
    implementation 'com.google.firebase:firebase-analytics-ktx' // Move this below the platform dependency
}

flutter {
    source = "../.."
}
